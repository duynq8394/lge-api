<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Upload Ẩn Danh PRO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>🔥 SECURE PROXY UPLOADER</h2>
        <div class="warning-box">
            <strong>Nguyên tắc an toàn:</strong> Luôn screenshot lại ảnh để xóa EXIF (metadata) trước khi chọn file tải lên hệ thống.
        </div>
        
        <div class="form-group" style="margin-bottom: 15px;">
            <label>Authorization Token (Bearer):</label>
            <textarea id="token" rows="2" placeholder="Dán mã Token (eyJhb...) vào đây..."></textarea>
            
            <div id="userInfoDisplay" class="info-box" style="display: none;"></div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label>ShopId:</label>
                <input type="number" id="shopId" value="359285">
            </div>
            <div class="form-group">
                <label>ShopCode:</label>
                <input type="text" id="shopCode" value="EASV11016">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Vĩ độ (Latitude):</label>
                <input type="text" id="lat" value="21.17003169232964">
            </div>
            <div class="form-group">
                <label>Kinh độ (Longitude):</label>
                <input type="text" id="lng" value="106.05863329637819">
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 20px;">
            <label>Chọn ảnh báo cáo (Đã xóa EXIF):</label>
            <input type="file" id="imageInput" accept="image/jpeg, image/png, image/jpg">
        </div>

        <button id="btnSubmit">🚀 THỰC THI GỬI LÊN MÁY CHỦ</button>
        
        <div class="log-terminal" id="logBox">[SYSTEM] Khởi tạo thành công. Máy chủ proxy đang chờ lệnh...</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
