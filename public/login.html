<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - LGE System</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #e9ecef;}
        .login-container { width: 100%; max-width: 400px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .login-title { text-align: center; color: #1a73e8; margin-bottom: 20px; font-size: 24px; font-weight: bold; }
        .msg-box { text-align: center; margin-bottom: 15px; font-size: 14px; font-weight: 600; min-height: 20px; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; font-size: 14px; cursor: pointer; color: #555;}
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-title">ĐĂNG NHẬP</div>
    <div class="msg-box" id="msgBox"></div>

    <div class="form-group">
        <label>Tài khoản:</label>
        <input type="text" id="username" placeholder="Nhập tài khoản...">
    </div>

    <div class="form-group">
        <label>Mật khẩu:</label>
        <input type="password" id="password" placeholder="Nhập mật khẩu...">
    </div>

    <label class="checkbox-group">
        <input type="checkbox" id="rememberMe"> Nhớ tài khoản & mật khẩu
    </label>

    <button id="btnLogin" onclick="processLogin()">ĐĂNG NHẬP</button>
</div>

<script>
    if (localStorage.getItem('lge_token')) window.location.href = 'index.html';

    // Tự động điền nếu đã nhớ
    window.onload = () => {
        if (localStorage.getItem('lge_saved_user')) {
            document.getElementById('username').value = localStorage.getItem('lge_saved_user');
            document.getElementById('password').value = localStorage.getItem('lge_saved_pass');
            document.getElementById('rememberMe').checked = true;
        }
    };

    function getClientTime() {
        const now = new Date();
        const pad = n => n.toString().padStart(2, '0');
        return `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    }

    async function processLogin() {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value.trim();
        const remember = document.getElementById('rememberMe').checked;
        const msgBox = document.getElementById('msgBox');
        const btn = document.getElementById('btnLogin');

        if (!user || !pass) { msgBox.style.color = '#dc3545'; msgBox.innerText = 'Vui lòng nhập đầy đủ!'; return; }

        btn.disabled = true; btn.innerText = "ĐANG XÁC THỰC..."; msgBox.innerText = "";

        const payload = {
            "username": user, "password": pass, "client_time": getClientTime(),
            "DeviceToken": "emMYBh-1sUq9shk3XNGqQL:APA...", "Platform": "ios",
            "IMEI": crypto.randomUUID().toUpperCase(), "AppId": "20H343", "versionid": "39"
        };

        try {
            const response = await fetch('/proxy-login', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ payload: payload })
            });
            const result = await response.json();

            if (response.ok && result.success && result.data.token) {
                // Lưu nhớ mật khẩu
                if (remember) {
                    localStorage.setItem('lge_saved_user', user);
                    localStorage.setItem('lge_saved_pass', pass);
                } else {
                    localStorage.removeItem('lge_saved_user');
                    localStorage.removeItem('lge_saved_pass');
                }

                localStorage.setItem('lge_token', result.data.token);
                localStorage.setItem('lge_emp_name', result.data.employeeName);
                
                msgBox.style.color = "#28a745"; msgBox.innerText = "Đăng nhập thành công!";
                setTimeout(() => { window.location.href = 'index.html'; }, 1000);
            } else {
                msgBox.style.color = "#dc3545"; msgBox.innerText = "Sai thông tin đăng nhập!";
            }
        } catch (error) {
            msgBox.style.color = "#dc3545"; msgBox.innerText = "Lỗi kết nối máy chủ!";
        } finally {
            btn.disabled = false; btn.innerText = "ĐĂNG NHẬP";
        }
    }
</script>
</body>
</html>
