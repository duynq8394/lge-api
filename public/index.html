<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LGE Field Force</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <div class="user-info">
            <span class="avatar">👤</span>
            <div>
                <div style="font-size: 11px; opacity: 0.8;">Xin chào,</div>
                <div class="user-name" id="empNameDisplay">Đang tải...</div>
            </div>
        </div>
        <button class="btn-logout" onclick="logout()">Đăng xuất</button>
    </header>

    <main class="app-body">
        <div id="tab-upload" class="tab-pane active">
            <div class="card">
                <div class="card-title">📍 Thông tin Check-in</div>
                <div class="form-group">
                    <label>Cửa hàng / Shop:</label>
                    <select id="shopSelect" class="form-control"><option value="">Đang tải dữ liệu...</option></select>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Vĩ độ (Lat):</label><input type="number" step="any" id="lat" class="form-control" value="21.17003169232964"></div>
                    <div class="form-group"><label>Kinh độ (Lng):</label><input type="number" step="any" id="lng" class="form-control" value="106.05863329637819"></div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">📸 Hình ảnh báo cáo</div>
                <div class="form-group">
                    <label class="file-upload-box" for="imageInput">
                        <div style="font-size: 24px; margin-bottom: 5px;">📷</div>
                        <div>Chạm để chọn ảnh từ thư viện</div>
                    </label>
                    <input type="file" id="imageInput" accept="image/jpeg, image/png, image/jpg" style="display: none;">
                    <div id="fileNameDisplay" style="text-align: center; margin-top: 10px; font-size: 12px; color: #a50034; font-weight: bold;"></div>
                </div>
                <button id="btnSubmit" class="btn-primary">🚀 GỬI BÁO CÁO</button>
            </div>
            <div class="log-terminal" id="logBox">Hệ thống sẵn sàng...</div>
        </div>

        <div id="tab-history" class="tab-pane">
            <div class="history-header">
                <h3>Lịch sử hôm nay</h3>
                <button onclick="loadHistory()" class="btn-refresh">🔄 Làm mới</button>
            </div>
            <div id="historyList" class="history-list"></div>
        </div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('tab-upload', this)">
            <div class="nav-icon">📤</div><div class="nav-label">Báo Cáo</div>
        </div>
        <div class="nav-item" onclick="switchTab('tab-history', this)">
            <div class="nav-icon">🕒</div><div class="nav-label">Lịch Sử</div>
        </div>
    </nav>
    <script src="app.js"></script>
</body>
</html>
